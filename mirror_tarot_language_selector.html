
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
--ink:#0a0710;--ink2:#1a1225;--ink3:#241a33;
--gold:#c9a84c;--gold2:#e8c97a;--gold3:#f5e4a8;
--purple:#7c3aed;--purple2:#9d5cf5;--purple3:#c4a0ff;
--mist:#a89cc0;--mist2:#d4cde8;--mist3:#ede9f5;
--surface:#1e1630;--surface2:#2a1f42;
}
body{background:var(--ink);color:var(--mist2);font-family:'DM Sans',system-ui,sans-serif;width:380px;}
.serif{font-family:'Cormorant Garamond',Georgia,serif;}
@keyframes twinkle{0%,100%{opacity:.1}50%{opacity:.7}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<div style="width:375px;min-height:700px;background:var(--ink);position:relative;overflow:hidden;" id="app">

  <canvas id="starfield" style="position:absolute;inset:0;pointer-events:none;z-index:0;"></canvas>

  <div style="position:relative;z-index:1;display:flex;flex-direction:column;min-height:700px;" id="lang-screen">

    <div style="height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;">
      <span style="font-size:15px;font-weight:500;color:var(--mist2);">9:41</span>
      <span style="font-size:12px;color:var(--mist2);">●●●</span>
    </div>

    <div style="padding:8px 20px 0;display:flex;align-items:center;gap:12px;">
      <div style="width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,0.05);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--mist2);font-size:20px;" onclick="goBack()">‹</div>
    </div>

    <div style="padding:20px 24px 16px;text-align:center;">
      <div style="width:60px;height:60px;border-radius:50%;background:rgba(124,58,237,0.15);border:1px solid rgba(201,168,76,0.25);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:26px;">
        ◈
      </div>
      <h2 class="serif" style="font-size:28px;font-weight:400;color:var(--mist3);margin-bottom:6px;">Choose Your Language</h2>
      <p style="font-size:13px;color:var(--mist);letter-spacing:0.3px;" id="subtitle-text">Mirror speaks your language</p>
    </div>

    <div style="padding:0 16px 8px;">
      <div style="background:rgba(255,255,255,0.04);border:0.5px solid rgba(201,168,76,0.15);border-radius:14px;display:flex;align-items:center;gap:10px;padding:0 14px;height:44px;">
        <span style="color:var(--mist);font-size:16px;">⌕</span>
        <input id="lang-search" type="text" placeholder="Search language..." style="background:transparent;border:none;outline:none;color:var(--mist2);font-size:14px;font-family:inherit;flex:1;width:100%;" oninput="filterLangs(this.value)">
        <span id="search-clear" style="color:var(--mist);cursor:pointer;font-size:18px;display:none;" onclick="clearSearch()">×</span>
      </div>
    </div>

    <div style="padding:8px 16px;overflow-y:auto;flex:1;" id="lang-list"></div>

    <div style="padding:12px 16px 24px;border-top:0.5px solid rgba(201,168,76,0.08);">
      <button id="confirm-btn" onclick="confirmLanguage()" style="width:100%;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ink);font-family:inherit;font-weight:500;font-size:16px;border:none;border-radius:16px;padding:16px;cursor:pointer;opacity:0.4;pointer-events:none;transition:opacity .2s;" disabled>
        Confirm
      </button>
    </div>
  </div>

  <div style="position:relative;z-index:1;display:none;flex-direction:column;align-items:center;justify-content:center;min-height:700px;padding:32px 24px;text-align:center;" id="success-screen">
    <div style="font-size:48px;margin-bottom:20px;" id="success-flag"></div>
    <h2 class="serif" style="font-size:30px;font-weight:400;color:var(--mist3);margin-bottom:8px;" id="success-title"></h2>
    <p style="font-size:14px;color:var(--mist);margin-bottom:32px;" id="success-sub"></p>
    <div style="background:rgba(201,168,76,0.08);border:0.5px solid rgba(201,168,76,0.2);border-radius:18px;padding:20px 24px;margin-bottom:32px;max-width:300px;">
      <p class="serif" style="font-size:18px;color:var(--mist3);font-style:italic;line-height:1.7;" id="success-quote"></p>
    </div>
    <button onclick="goBack()" style="background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ink);font-family:inherit;font-weight:500;font-size:15px;border:none;border-radius:14px;padding:14px 32px;cursor:pointer;">
      Back to Settings
    </button>
  </div>

</div>

<script>
const LANGS = [
  {code:'en', flag:'🇬🇧', name:'English',        native:'English',          quote:'"The cards hold a mirror to your soul."',            subtitle:'Mirror speaks your language'},
  {code:'uk', flag:'🇺🇦', name:'Ukrainian',      native:'Українська',       quote:'"Карти тримають дзеркало твоєї душі."',              subtitle:'Mirror говорить твоєю мовою'},
  {code:'fr', flag:'🇫🇷', name:'French',          native:'Français',         quote:'"Les cartes tendent un miroir à ton âme."',           subtitle:'Mirror parle votre langue'},
  {code:'it', flag:'🇮🇹', name:'Italian',         native:'Italiano',         quote:'"Le carte tengono uno specchio alla tua anima."',     subtitle:'Mirror parla la tua lingua'},
  {code:'de', flag:'🇩🇪', name:'German',          native:'Deutsch',          quote:'"Die Karten halten einen Spiegel für deine Seele."',  subtitle:'Mirror spricht deine Sprache'},
  {code:'es', flag:'🇪🇸', name:'Spanish',         native:'Español',          quote:'"Las cartas sostienen un espejo de tu alma."',        subtitle:'Mirror habla tu idioma'},
  {code:'pt', flag:'🇧🇷', name:'Portuguese',      native:'Português',        quote:'"As cartas espelham a tua alma."',                    subtitle:'Mirror fala a sua língua'},
  {code:'pl', flag:'🇵🇱', name:'Polish',          native:'Polski',           quote:'"Karty trzymają lustro twojej duszy."',               subtitle:'Mirror mówi twoim językiem'},
  {code:'nl', flag:'🇳🇱', name:'Dutch',           native:'Nederlands',       quote:'"De kaarten houden een spiegel voor je ziel."',       subtitle:'Mirror spreekt uw taal'},
  {code:'sv', flag:'🇸🇪', name:'Swedish',         native:'Svenska',          quote:'"Korten håller en spegel mot din själ."',             subtitle:'Mirror talar ditt språk'},
  {code:'no', flag:'🇳🇴', name:'Norwegian',       native:'Norsk',            quote:'"Kortene holder et speil mot din sjel."',             subtitle:'Mirror snakker ditt språk'},
  {code:'da', flag:'🇩🇰', name:'Danish',          native:'Dansk',            quote:'"Kortene holder et spejl mod din sjæl."',             subtitle:'Mirror taler dit sprog'},
  {code:'ja', flag:'🇯🇵', name:'Japanese',        native:'日本語',           quote:'"カードはあなたの魂に鏡を向けています。"',          subtitle:'Mirrorはあなたの言語を話します'},
  {code:'ko', flag:'🇰🇷', name:'Korean',          native:'한국어',           quote:'"카드는 영혼을 비추는 거울입니다."',                subtitle:'Mirror가 당신의 언어로 말합니다'},
  {code:'zh', flag:'🇨🇳', name:'Chinese',         native:'中文',             quote:'"牌是你灵魂的镜子。"',                              subtitle:'Mirror说您的语言'},
  {code:'ar', flag:'🇸🇦', name:'Arabic',          native:'العربية',          quote:'"تعكس البطاقات روحك."',                              subtitle:'Mirror يتحدث لغتك'},
  {code:'tr', flag:'🇹🇷', name:'Turkish',         native:'Türkçe',           quote:'"Kartlar ruhuna ayna tutar."',                        subtitle:'Mirror dilinizi konuşuyor'},
  {code:'hi', flag:'🇮🇳', name:'Hindi',           native:'हिन्दी',           quote:'"पत्ते आपकी आत्मा का दर्पण हैं।"',               subtitle:'Mirror आपकी भाषा बोलता है'},
  {code:'ru', flag:'🇷🇺', name:'Russian',         native:'Русский',          quote:'"Карты держат зеркало твоей души."',                  subtitle:'Mirror говорит на вашем языке'},
  {code:'cs', flag:'🇨🇿', name:'Czech',           native:'Čeština',          quote:'"Karty drží zrcadlo tvé duše."',                     subtitle:'Mirror mluví vaším jazykem'},
];

let selected = null;
let filtered = [...LANGS];

function renderList(langs) {
  const el = document.getElementById('lang-list');
  if (!langs.length) {
    el.innerHTML = '<div style="text-align:center;padding:32px 0;color:var(--mist);font-size:14px;">No languages found</div>';
    return;
  }
  el.innerHTML = langs.map((l, i) => `
    <div onclick="selectLang('${l.code}')" id="row-${l.code}" style="
      display:flex;align-items:center;gap:14px;
      padding:13px 16px;border-radius:14px;cursor:pointer;
      margin-bottom:6px;
      background:${selected===l.code?'rgba(201,168,76,0.1)':'rgba(255,255,255,0.02)'};
      border:${selected===l.code?'1px solid rgba(201,168,76,0.35)':'0.5px solid rgba(255,255,255,0.06)'};
      transition:all .15s;
      animation:fadeIn .3s ease both;
      animation-delay:${i*0.03}s;
    ">
      <span style="font-size:26px;flex-shrink:0;line-height:1;">${l.flag}</span>
      <div style="flex:1;min-width:0;">
        <div style="font-size:15px;color:${selected===l.code?'var(--gold2)':'var(--mist3)'};font-weight:${selected===l.code?'500':'400'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${l.name}</div>
        <div style="font-size:12px;color:var(--mist);margin-top:1px;">${l.native}</div>
      </div>
      <div style="width:22px;height:22px;border-radius:50%;border:${selected===l.code?'none':'1px solid rgba(255,255,255,0.12)'};background:${selected===l.code?'var(--gold)':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;">
        ${selected===l.code?'<span style="color:var(--ink);font-size:13px;font-weight:700;line-height:1;">✓</span>':''}
      </div>
    </div>
  `).join('');
}

function selectLang(code) {
  selected = code;
  const lang = LANGS.find(l => l.code === code);
  const btn = document.getElementById('confirm-btn');
  btn.disabled = false;
  btn.style.opacity = '1';
  btn.style.pointerEvents = 'auto';
  btn.textContent = lang ? `Continue in ${lang.name}` : 'Confirm';
  document.getElementById('subtitle-text').textContent = lang ? lang.subtitle : 'Mirror speaks your language';
  renderList(filtered);
}

function filterLangs(q) {
  const clear = document.getElementById('search-clear');
  clear.style.display = q ? 'block' : 'none';
  filtered = q
    ? LANGS.filter(l => l.name.toLowerCase().includes(q.toLowerCase()) || l.native.toLowerCase().includes(q.toLowerCase()))
    : [...LANGS];
  renderList(filtered);
}

function clearSearch() {
  document.getElementById('lang-search').value = '';
  document.getElementById('search-clear').style.display = 'none';
  filtered = [...LANGS];
  renderList(filtered);
}

function confirmLanguage() {
  if (!selected) return;
  const lang = LANGS.find(l => l.code === selected);
  document.getElementById('success-flag').textContent = lang.flag;
  document.getElementById('success-title').textContent = lang.native;
  document.getElementById('success-sub').textContent = lang.subtitle;
  document.getElementById('success-quote').textContent = lang.quote;
  document.getElementById('lang-screen').style.display = 'none';
  const s = document.getElementById('success-screen');
  s.style.display = 'flex';
  s.style.animation = 'slideUp .4s ease both';
}

function goBack() {
  document.getElementById('success-screen').style.display = 'none';
  document.getElementById('lang-screen').style.display = 'flex';
  document.getElementById('lang-screen').style.flexDirection = 'column';
  document.getElementById('lang-screen').style.minHeight = '700px';
}

const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
canvas.width = 375; canvas.height = 700;
const stars = Array.from({length:70},()=>({x:Math.random()*375,y:Math.random()*700,r:Math.random()>0.7?1.5:1,t:Math.random()*Math.PI*2,s:0.5+Math.random()*2}));
function drawStars(){
  ctx.clearRect(0,0,375,700);
  stars.forEach(s=>{
    s.t+=0.01*s.s;
    const a=0.1+0.7*Math.abs(Math.sin(s.t));
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars();

renderList(LANGS);
</script>
